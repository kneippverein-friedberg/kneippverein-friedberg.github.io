  text: "In den Sommerferien bietet Barbara Löber gemeinsames Kneippen an verschiedenen Kneipp-Becken in der Umgebung an. Treffpunkt ist jeweils um 17:00 Uhr.  Die Termine sind: <br>- 04.08.2026 Mering am Lippgarten, Marienstraße 7; <br>- 11:08.2026 in Merching, Paartalweg Ecke Bahnhofstraße; <br>- 18.08.2026 in Königsbrunn im Park der Sinne, Gerstenstraße 10; <br>- 25.08.2026 in Pfersee, Ganghoferstraße 28b (Zugang an der Brücke)."


